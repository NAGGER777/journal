<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Журнал оценок</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
<style>
body {
    font-family: Arial;
    margin: 0;
    background: #f4f6f9;
}

.nav {
    display: flex;
    background: #2c3e50;
}

.nav button {
    flex: 1;
    padding: 14px;
    color: white;
    background: none;
    border: none;
    cursor: pointer;
}

.nav button:hover {
    background: #34495e;
}

.tab {
    display: none;
    padding: 20px;
}

.active {
    display: block;
}

input, button {
    margin: 5px;
    padding: 6px;
}

table {
    border-collapse: collapse;
    width: 100%;
    background: white;
}

td, th {
    border: 1px solid #ccc;
    padding: 6px;
    text-align: center;
}
</style>
</head>

<body>

<div class="nav">
    <button onclick="openTab('load')">Загрузка</button>
    <button onclick="openTab('edit')">Редактор</button>
    <button onclick="openTab('statsTable')">Статистика (таблица)</button>
    <button onclick="openTab('statsChart')">Статистика (графики)</button>
    <button onclick="openTab('help')">Помощь</button>
    <button onclick="openTab('about')">О разработчике</button>
</div>

<!-- Загрузка -->
<div id="load" class="tab active">
    <h2>Загрузка файла</h2>
    <input type="file" id="fileInput">
    <table id="dataTable"></table>
</div>

<!-- Редактор -->
<div id="edit" class="tab">
    <h2>Редактор журнала</h2>

    <input type="text" id="name" placeholder="ФИО">
    <input type="text" id="class" placeholder="Класс">
    <input type="text" id="subject" placeholder="Предмет">
    <input type="number" id="grade" placeholder="Оценка">

    <button onclick="addRecord()">Добавить</button>
    <button onclick="saveFile()">Сохранить</button>

    <table id="editTable"></table>
</div>

<!-- Таблица статистики -->
<div id="statsTable" class="tab">
    <h2>Статистика (таблица)</h2>
    <div id="statsOutput"></div>
</div>

<!-- Графики -->
<div id="statsChart" class="tab">
    <h2>Графики</h2>
    <div id="chartsContainer"></div>
</div>

<!-- Помощь -->
<div id="help" class="tab">
    <h2>Помощь</h2>
    <p>Загрузка — открытие файла с оценками.</p>
    <p>Редактор — добавление оценок.</p>
    <p>Статистика — анализ оценок.</p>
</div>

<!-- О разработчике -->
<div id="about" class="tab">
    <h2>О разработчике</h2>
    <p>ФИО: Пинигин Георгий Максимович</p>
    <p>Email: gogapinigin@mail.com</p>

    <img src="canye.png">
</div>

<script>
let data = [];
let chartInstance = null;

function openTab(id) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}

document.getElementById('fileInput').addEventListener('change', function(e) {
    const file = e.target.files[0];
    if (!file) return;

    const ext = file.name.split('.').pop().toLowerCase();
    const reader = new FileReader();

    if (ext === 'xlsx') {
        reader.onload = function(e) {
            const workbook = XLSX.read(e.target.result, { type: 'array' });
            const sheetName = workbook.SheetNames[0];
            const sheet = workbook.Sheets[sheetName];
            const rows = XLSX.utils.sheet_to_json(sheet, { header: 1 });
            parseXLSX(rows);
        };
        reader.readAsArrayBuffer(file);
    } else {
        reader.onload = function(e) {
            const text = e.target.result;
            parseCSV(text);
        };
        reader.readAsText(file, 'UTF-8');
    }
});

function parseXLSX(rows) {
    data = [];

    if (rows.length < 2) return;

    const headers = rows[0];

    const nameIndex = headers.findIndex(h => String(h).toLowerCase().includes("имя"));
    const surnameIndex = headers.findIndex(h => String(h).toLowerCase().includes("фам"));
    const patronymicIndex = headers.findIndex(h => String(h).toLowerCase().includes("отч"));
    const classIndex = headers.findIndex(h => String(h).toLowerCase().includes("класс"));

    for (let i = 1; i < rows.length; i++) {
        const row = rows[i];
        if (!row) continue;

        const fio = [
            row[surnameIndex] || "",
            row[nameIndex] || "",
            row[patronymicIndex] || ""
        ].join(" ").trim();

        const className = String(row[classIndex] || "").trim();

        for (let j = classIndex + 1; j < headers.length; j++) {
            const subject = String(headers[j] || "").trim();
            const grade = Number(row[j]);

            if (!subject || isNaN(grade)) continue;

            data.push({
                name: fio,
                class: className,
                subject: subject,
                grade: grade
            });
        }
    }

    renderTable();
}
function parseCSV(text) {
    data = [];

    const rows = text.split(/\r?\n/).filter(row => row.trim() !== "");
    if (rows.length === 0) {
        renderTable();
        return;
    }

    let delimiter = ",";
    if (rows[0].includes(";")) delimiter = ";";
    if (rows[0].includes("\t")) delimiter = "\t";

    let startIndex = 0;
    const firstRow = rows[0].split(delimiter).map(x => x.trim().toLowerCase());

    if (
        firstRow.includes('фио') ||
        firstRow.includes('класс') ||
        firstRow.includes('предмет') ||
        firstRow.includes('оценка') ||
        firstRow.includes('name') ||
        firstRow.includes('class') ||
        firstRow.includes('subject') ||
        firstRow.includes('grade')
    ) {
        startIndex = 1;
    }

    for (let i = startIndex; i < rows.length; i++) {
        const cols = rows[i].split(delimiter).map(x => x.trim());
        if (cols.length < 4) continue;

        data.push({
            name: cols[0],
            class: cols[1],
            subject: cols[2],
            grade: Number(cols[3])
        });
    }

    renderTable();
}
function renderTable() {
    let grouped = {};

    data.forEach(d => {
        const key = d.name + "||" + d.class;

        if (!grouped[key]) {
            grouped[key] = {
                name: d.name,
                class: d.class,
                subjects: {}
            };
        }

        grouped[key].subjects[d.subject] = d.grade;
    });

    let allSubjects = [];
    data.forEach(d => {
        if (!allSubjects.includes(d.subject)) {
            allSubjects.push(d.subject);
        }
    });

    let html = "<tr><th>ФИО</th><th>Класс</th>";
    allSubjects.forEach(subject => {
        html += `<th>${subject}</th>`;
    });
    html += "<th>Действия</th></tr>";

    Object.values(grouped).forEach(student => {
        html += `<tr>
            <td>${student.name}</td>
            <td>${student.class}</td>`;

        allSubjects.forEach(subject => {
            const grade = student.subjects[subject] ?? "";
            html += `<td>${grade}</td>`;
        });

        html += `<td>
            <button onclick="deleteStudent('${student.name.replace(/'/g, "\\'")}', '${student.class.replace(/'/g, "\\'")}')">
                Удалить
            </button>
        </td></tr>`;
    });

    document.getElementById("dataTable").innerHTML = html;
    document.getElementById("editTable").innerHTML = html;

    calcStats();
}

function deleteStudent(name, className) {
    if (!confirm(`Удалить ученика ${name} (${className})?`)) return;

    data = data.filter(d => !(d.name === name && d.class === className));
    renderTable();
}

function addRecord() {
    const name = document.getElementById("name").value;
    const className = document.getElementById("class").value;
    const subject = document.getElementById("subject").value;
    const grade = Number(document.getElementById("grade").value);

    data.push({name, class: className, subject, grade});
    renderTable();
}

function saveFile() {
    let allSubjects = [];

    data.forEach(d => {
        if (!allSubjects.includes(d.subject)) {
            allSubjects.push(d.subject);
        }
    });

    let grouped = {};

    data.forEach(d => {
        const key = d.name + "||" + d.class;

        if (!grouped[key]) {
            grouped[key] = {
                name: d.name,
                class: d.class,
                subjects: {}
            };
        }

        grouped[key].subjects[d.subject] = d.grade;
    });

    let sheetData = [];

    sheetData.push(["ФИО", "Класс", ...allSubjects]);

    Object.values(grouped).forEach(student => {
        let row = [student.name, student.class];

        allSubjects.forEach(subject => {
            row.push(student.subjects[subject] ?? "");
        });

        sheetData.push(row);
    });

    const ws = XLSX.utils.aoa_to_sheet(sheetData);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "Журнал");

    XLSX.writeFile(wb, "Журнал_оценок.xlsx");
}

function getStats(grades) {
    const sorted = [...grades].sort((a, b) => a - b);
    const count = sorted.length;

    const average = count
        ? sorted.reduce((sum, g) => sum + g, 0) / count
        : 0;

    let median = 0;
    if (count > 0) {
        const mid = Math.floor(count / 2);
        median = count % 2 === 0
            ? (sorted[mid - 1] + sorted[mid]) / 2
            : sorted[mid];
    }

    const gradeCounts = { 2: 0, 3: 0, 4: 0, 5: 0 };

    sorted.forEach(g => {
        if (gradeCounts[g] !== undefined) {
            gradeCounts[g]++;
        }
    });

    const gradePercents = {
        2: count ? ((gradeCounts[2] / count) * 100).toFixed(1) : "0.0",
        3: count ? ((gradeCounts[3] / count) * 100).toFixed(1) : "0.0",
        4: count ? ((gradeCounts[4] / count) * 100).toFixed(1) : "0.0",
        5: count ? ((gradeCounts[5] / count) * 100).toFixed(1) : "0.0"
    };

    return {
        average,
        median,
        count,
        gradeCounts,
        gradePercents
    };
}

function calcStats() {
    const classSubjectStats = {};
    const subjectOverallStats = {};

    data.forEach(d => {
        const className = d.class || "Без класса";
        const subject = d.subject || "Без предмета";
        const grade = Number(d.grade);

        if (isNaN(grade)) return;

        if (!classSubjectStats[className]) {
            classSubjectStats[className] = {};
        }
        if (!classSubjectStats[className][subject]) {
            classSubjectStats[className][subject] = [];
        }
        classSubjectStats[className][subject].push(grade);

        if (!subjectOverallStats[subject]) {
            subjectOverallStats[subject] = [];
        }
        subjectOverallStats[subject].push(grade);
    });

    let html = "";

    html += "<h2>Статистика по классам и предметам</h2>";

    Object.keys(classSubjectStats).sort().forEach(className => {
        html += `<h3>Класс: ${className}</h3>`;
        html += `
            <table>
                <tr>
                    <th>Предмет</th>
                    <th>Средняя</th>
                    <th>Медиана</th>
                    <th>Количество оценок</th>
                    <th>2</th>
                    <th>3</th>
                    <th>4</th>
                    <th>5</th>
                </tr>
        `;

        Object.keys(classSubjectStats[className]).sort().forEach(subject => {
            const grades = classSubjectStats[className][subject];
            const stats = getStats(grades);

            html += `
                <tr>
                    <td>${subject}</td>
                    <td>${stats.average.toFixed(2)}</td>
                    <td>${stats.median.toFixed(2)}</td>
                    <td>${stats.count}</td>
                    <td>${stats.gradeCounts[2]} (${stats.gradePercents[2]}%)</td>
                    <td>${stats.gradeCounts[3]} (${stats.gradePercents[3]}%)</td>
                    <td>${stats.gradeCounts[4]} (${stats.gradePercents[4]}%)</td>
                    <td>${stats.gradeCounts[5]} (${stats.gradePercents[5]}%)</td>
                </tr>
            `;
        });

        html += "</table><br>";
    });

    html += "<h2>Статистика по всем ученикам по предметам</h2>";
    html += `
        <table>
            <tr>
                <th>Предмет</th>
                <th>Средняя</th>
                <th>Медиана</th>
                <th>Количество оценок</th>
                <th>2</th>
                <th>3</th>
                <th>4</th>
                <th>5</th>
            </tr>
    `;

    Object.keys(subjectOverallStats).sort().forEach(subject => {
        const grades = subjectOverallStats[subject];
        const stats = getStats(grades);

        html += `
            <tr>
                <td>${subject}</td>
                <td>${stats.average.toFixed(2)}</td>
                <td>${stats.median.toFixed(2)}</td>
                <td>${stats.count}</td>
                <td>${stats.gradeCounts[2]} (${stats.gradePercents[2]}%)</td>
                <td>${stats.gradeCounts[3]} (${stats.gradePercents[3]}%)</td>
                <td>${stats.gradeCounts[4]} (${stats.gradePercents[4]}%)</td>
                <td>${stats.gradeCounts[5]} (${stats.gradePercents[5]}%)</td>
            </tr>
        `;
    });

    html += "</table>";

    document.getElementById("statsOutput").innerHTML = html;

    drawChartsByClass(classSubjectStats, subjectOverallStats);
}

function drawChartsByClass(classSubjectStats, subjectOverallStats) {
    const container = document.getElementById("chartsContainer");
    container.innerHTML = "";

    const overallBlock = document.createElement("div");
    overallBlock.innerHTML = `
        <h3>Все классы</h3>
        <canvas id="chart_overall"></canvas>
    `;
    container.appendChild(overallBlock);

    const overallCtx = document.getElementById("chart_overall").getContext("2d");
    new Chart(overallCtx, {
        type: 'bar',
        data: {
            labels: Object.keys(subjectOverallStats),
            datasets: [{
                label: 'Средняя оценка',
                data: Object.keys(subjectOverallStats).map(subject => {
                    const arr = subjectOverallStats[subject];
                    return arr.reduce((a, b) => a + b, 0) / arr.length;
                }),
                backgroundColor: 'rgba(54, 162, 235, 0.6)',
                borderColor: 'rgba(54, 162, 235, 1)',
                borderWidth: 1
            }]
        },
        options: {
            responsive: true,
            scales: {
                y: {
                    beginAtZero: true,
                    max: 5
                }
            }
        }
    });

    Object.keys(classSubjectStats).sort().forEach((className, index) => {
        const chartId = `chart_class_${index}`;

        const block = document.createElement("div");
        block.style.marginTop = "30px";
        block.innerHTML = `
            <h3>Класс: ${className}</h3>
            <canvas id="${chartId}"></canvas>
        `;
        container.appendChild(block);

        const subjects = Object.keys(classSubjectStats[className]);
        const averages = subjects.map(subject => {
            const arr = classSubjectStats[className][subject];
            return arr.reduce((a, b) => a + b, 0) / arr.length;
        });

        const ctx = document.getElementById(chartId).getContext("2d");

        new Chart(ctx, {
            type: 'bar',
            data: {
                labels: subjects,
                datasets: [{
                    label: 'Средняя оценка',
                    data: averages,
                    backgroundColor: 'rgba(54, 162, 235, 0.6)',
                    borderColor: 'rgba(54, 162, 235, 1)',
                    borderWidth: 1
                }]
            },
            options: {
                responsive: true,
                scales: {
                    y: {
                        beginAtZero: true,
                        max: 5
                    }
                }
            }
        });
    });
}
</script>

</body>
</html>
